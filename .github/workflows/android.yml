name: Android APK (Buildozer)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache buildozer & gradle
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
            ~/.gradle
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            python3 python3-pip python3-setuptools python3-wheel \
            git zip unzip curl \
            openjdk-17-jdk \
            build-essential \
            libffi-dev libssl-dev \
            zlib1g-dev \
            libjpeg-dev libpng-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libgl1-mesa-dev \
            autoconf automake libtool pkg-config cmake

      - name: Install Python build tools
        run: |
          python3 -m pip install --upgrade pip setuptools wheel
          python3 -m pip install cython==0.29.36
          python3 -m pip install buildozer

      # ---- Android SDK: install cmdline-tools, accept licenses, install stable build-tools (NOT rc) ----
      - name: Setup Android SDK (accept licenses + install build-tools)
        env:
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
        run: |
          set -eux

          mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
          cd /tmp

          # Download Android cmdline-tools (latest)
          curl -L -o cmdline.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline.zip -d "$ANDROID_SDK_ROOT/cmdline-tools"
          mv "$ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools" "$ANDROID_SDK_ROOT/cmdline-tools/latest"

          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"

          # Accept licenses non-interactively
          yes | sdkmanager --licenses

          # Install required packages (choose STABLE build-tools)
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

          # Sanity check: aidl should exist now
          ls -la "$ANDROID_SDK_ROOT/build-tools/34.0.0" | head -n 50

      - name: Build APK
        env:
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
        run: |
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CraftPong-APK
          path: bin/*.apk